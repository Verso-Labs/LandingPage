<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — VersoAI</title>
  <meta name="description" content="Stay tuned for the latest updates from VersoAI.">
  <link rel="icon" href="assets/origami.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@400;500;600;700&family=Spectral:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      scroll-padding-top: 100px;
    }

    body {
      font-family: 'Inter', sans-serif;
      color: #1a1a1a;
      background-color: #f8f8f8;
      overflow-x: hidden;
    }

    /* Navigation */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 60px;
      background-color: #f8f8f8;
      font-family: 'Spectral', serif;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 16px;
      font-weight: 600;
      color: #1a1a1a;
      text-decoration: none;
      transition: color 0.3s;
    }

    .logo:hover {
      color: #000000;
    }

    .logo img {
      width: 29px;
      height: 29px;
      filter: brightness(0) saturate(100%) invert(6%) sepia(0%) saturate(0%) hue-rotate(0deg) brightness(99%) contrast(99%);
      transition: filter 0.3s;
    }

    .logo span {
      font-family: 'Spectral', serif;
    }

    .logo:hover img {
      filter: brightness(0) saturate(100%) invert(0%) sepia(0%) saturate(0%) hue-rotate(0deg) brightness(0%) contrast(100%);
    }

    .nav-links {
      display: flex;
      gap: 40px;
      list-style: none;
    }

    .nav-links a {
      color: #666;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.3s;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: #1a1a1a;
    }

    .nav-cta {
      background-color: transparent;
      color: #1a1a1a;
      border: none;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.3s;
    }

    .nav-cta:hover {
      opacity: 0.7;
    }

    /* Content Section */
    .content {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 80px 60px;
      text-align: center;
    }

    .content h1 {
      font-family: 'Spectral', serif;
      font-size: 19px;
      font-weight: 400;
      line-height: 1.2;
      color: #1a1a1a;
    }

    /* CTA Banner */
    .cta-banner {
      padding: 100px 60px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, rgba(230, 235, 240, 0.5) 0%, rgba(240, 230, 235, 0.5) 100%);
    }

    .cta-banner::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: url('assets/waterlilies.jpg');
      background-size: cover;
      background-position: center;
      opacity: 0.50;
      z-index: 0;
    }

    .cta-banner-content {
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .cta-banner h2 {
      font-family: 'Playfair Display', serif;
      font-size: 29px;
      font-weight: 400;
      line-height: 1.3;
      color: #1a1a1a;
      margin-bottom: 40px;
    }

    .cta-banner-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      align-items: center;
    }

    .cta-button {
      display: inline-block;
      background-color: #1a1a1a;
      color: #ffffff;
      padding: 16px 40px;
      border-radius: 50px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .cta-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
    }

    .cta-button-secondary {
      display: inline-block;
      background-color: #f8f8f8;
      color: #1a1a1a;
      border: 2px solid #1a1a1a;
      padding: 16px 40px;
      border-radius: 50px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s;
    }

    .cta-button-secondary:hover {
      background-color: #1a1a1a;
      color: #ffffff;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
    }

    /* Footer */
    footer {
      background-color: #000000;
      padding: 40px 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .footer-brand img {
      width: 32px;
      height: 32px;
    }

    .footer-brand span {
      font-family: 'Spectral', serif;
      font-size: 18px;
      font-weight: 600;
      color: #ffffff;
    }

    .footer-text {
      font-size: 14px;
      color: #999999;
    }

    /* Responsive */
    @media (max-width: 768px) {
      nav {
        padding: 20px 30px;
      }

      .nav-links {
        display: none;
      }

      .content {
        padding: 100px 30px 60px;
      }

      .content h1 {
        font-size: 13px;
      }

      .cta-banner {
        padding: 80px 30px;
      }

      .cta-banner h2 {
        font-size: 32px;
      }

      .cta-banner-buttons {
        flex-direction: column;
        gap: 12px;
      }

      .cta-banner-buttons .cta-button,
      .cta-banner-buttons .cta-button-secondary {
        width: 100%;
      }

      footer {
        padding: 30px;
        flex-direction: column;
        gap: 20px;
        text-align: center;
      }
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav>
    <a href="index.html" class="logo">
      <img src="assets/origami.png" alt="VersoAI Logo">
      <span>VersoAI</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html#intelligence">Features</a></li>
      <li><a href="index.html#models">Models</a></li>
      <li><a href="pricing.html">Pricing</a></li>
      <li><a href="pricing.html">Contact Us</a></li>
    </ul>
    <a href="demo.html" class="nav-cta">Book a demo</a>
  </nav>

  <!-- Content Section -->
  <section class="content">
    <h1>Stay tuned...</h1>
  </section>

  <!-- CTA Banner -->
  <section class="cta-banner">
    <div class="cta-banner-content">
      <h2>Start working on your presentations in seconds.<br>No credit cards needed.</h2>
      <div class="cta-banner-buttons">
        <a href="https://verso.fly.dev/playground/" class="cta-button">Get started</a>
        <a href="demo.html" class="cta-button-secondary">Book a demo</a>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <div class="footer-brand">
      <img src="assets/origami.png" alt="VersoAI Logo" style="filter: brightness(0) invert(1);">
      <span>VersoAI</span>
    </div>
    <div class="footer-text">
      &copy; 2026 VersoAI. All rights reserved.
    </div>
  </footer>

</body>
</html>
